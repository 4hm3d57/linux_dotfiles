[colors]
background = #73110e16
background-alt = #3a3a3a
foreground = #e6e6e6
alert = #e06c75
primary = #c0c0c0
secondary = #d0d0d0
disabled = #7f7f7f
green = #98c379
yellow = #e5c07b
red = #e06c75
blue = #8a8f98
separator-foreground = #555555


[bar/main]
width = 100%
height = 28
radius = 0
separator = "|"
separator-foreground = ${colors.separator-foreground}
background = ${colors.background}
foreground = ${colors.foreground}
line-size = 2
border-size = 0
padding-left = 0
padding-right = 0
module-margin = 0

font-0 = FiraCode Nerd Font:size=11;2
font-1 = Noto Color Emoji:size=11;2

modules-left = i3 
modules-center = xwindow
modules-right = wlan pulseaudio battery date time systray

cursor-click = pointer
cursor-scroll = ns-resize
override-redirect = false
wm-restack = i3

; Global module padding overrides
format-connected-padding = 1
format-volume-padding = 1
format-muted-padding = 1
format-padding = 1        
format-charging-padding = 1
format-discharging-padding = 1

; =========================
; WORKSPACES
; =========================
[module/i3]
type = internal/i3
pin-workspaces = true
strip-wsnumbers = false
index-sort = true
wrapping-scroll = false

; FOCUSED WORKSPACE (Current)
label-focused = %name%
; This makes the background transparent, matching the rest of your bar
label-focused-background = ${colors.background}
; Text color for the active workspace number
label-focused-foreground = ${colors.green}
; This adds the bottom bar indicator using your accent color
label-focused-underline = ${colors.green}
label-focused-padding = 1

; UNFOCUSED WORKSPACES
label-unfocused = %name%
label-unfocused-foreground = ${colors.foreground}
label-unfocused-padding = 1

; VISIBLE WORKSPACES (On a second monitor, if applicable)
label-visible = %name%
label-visible-foreground = ${colors.yellow}
label-visible-underline = ${colors.yellow}
label-visible-padding = 1

; URGENT WORKSPACES
label-urgent = %name%
label-urgent-foreground = ${colors.red}
label-urgent-underline = ${colors.red}
label-urgent-padding = 1


[module/systray]
type = internal/tray
tray-spacing = 6px
tray-padding = 0px
tray-size = 19px
tray-background = ${colors.background}

[module/xwindow]
type = internal/xwindow
label = %title:0:50:...%
label-padding = 1
label-foreground = ${colors.foreground}


; =========================
; WIFI / NETWORK
; =========================
[module/wlan]
type = internal/network
interface-type = wireless
interval = 3

; FIXED: Changed to the full absolute path so Polybar can launch it on Debian
format-connected = %{A1:~/.local/bin/networkmanager_dmenu:}<ramp-signal>  <label-connected>%{A}
format-connected-padding = 1

label-connected = %essid%
label-connected-foreground = ${colors.foreground}

; FIXED: Changed to the full absolute path here as well
format-disconnected = %{A1:~/.local/bin/networkmanager_dmenu:}<label-disconnected>%{A}
format-disconnected-padding = 1
label-disconnected =  Disconnected
label-disconnected-foreground = ${colors.disabled}

ramp-signal-0 = 
ramp-signal-1 = 
ramp-signal-2 = 
ramp-signal-3 = 
ramp-signal-4 = 

ramp-signal-0-foreground = ${colors.red}
ramp-signal-1-foreground = ${colors.yellow}
ramp-signal-2-foreground = ${colors.yellow}
ramp-signal-3-foreground = ${colors.green}
ramp-signal-4-foreground = ${colors.green}


; =========================
; VOLUME
; =========================
[module/pulseaudio]
type = internal/pulseaudio
use-ui-max = false
interval = 2

format-volume = <label-volume>
format-volume-padding = 1
label-volume = %{T1}%{T-}  %percentage%%
; CHANGED: Changed from blue to standard foreground
label-volume-foreground = ${colors.foreground}

format-muted = <label-muted>
format-muted-padding = 1
label-muted = %{T1}󰝟%{T-}  muted
label-muted-foreground = ${colors.disabled}

; =========================
; CPU
; =========================
[module/cpu]
type = internal/cpu
interval = 2

format = <label>
format-padding = 1
label = %{T2}%{T-}  %percentage%%
; CHANGED: Changed from secondary (gray) to standard foreground
label-foreground = ${colors.foreground}

; =========================
; MEMORY
; =========================
[module/memory]
type = internal/memory
interval = 2

format = <label>
format-padding = 1

label = %{T1}󰑭%{T-} %gb_used%
; CHANGED: Changed from blue to standard foreground
label-foreground = ${colors.foreground}


; =========================
; BATTERY / CHARGER
; =========================
[module/battery]
type = internal/battery
battery = BAT0
adapter = AC0
full-at = 99
poll-interval = 5

format-charging = <animation-charging> <label-charging>
format-charging-padding = 1
label-charging = %percentage%%
label-charging-foreground = ${colors.green}

format-discharging = <ramp-capacity> <label-discharging>
format-discharging-padding = 1
label-discharging = %percentage%%
label-discharging-foreground = ${colors.foreground}

format-full = <label-full>
format-full-padding = 1
label-full =  %percentage%%
label-full-foreground = ${colors.green}

animation-charging-0 = 
animation-charging-1 = 
animation-charging-2 = 
animation-charging-3 = 
animation-charging-4 = 
animation-charging-framerate = 750

ramp-capacity-0 = 
ramp-capacity-1 = 
ramp-capacity-2 = 
ramp-capacity-3 = 
ramp-capacity-4 = 

ramp-capacity-0-foreground = ${colors.red}
ramp-capacity-1-foreground = ${colors.red}
ramp-capacity-2-foreground = ${colors.yellow}
ramp-capacity-3-foreground = ${colors.green}
ramp-capacity-4-foreground = ${colors.green}


; =========================
; DATE / TIME
; =========================
[module/date]
type = internal/date
interval = 5
date = %d/%m/%y
format = <label>
format-padding = 1
; Uses a calendar icon (replace  with your preferred font icon)
label = %{T2}%{T-} %date%
label-foreground = ${colors.foreground}

[module/time]
type = internal/date
interval = 1
time = %I:%M%p
format = <label>
format-padding = 1
; Uses your original clock icon 
label = %{T2}%{T-} %time%
label-foreground = ${colors.foreground}
