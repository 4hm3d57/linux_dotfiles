backend = "glx";
vsync = true;

# Blur Settings
blur-method = "dual_kawase";
blur-strength = 4;
blur-background = true;

# This rule forces Rofi to be 85% transparent regardless of other settings
opacity-rule = [
    "65:class_g = 'Rofi'"
];

# Corner radius
corner-radius = 8;
rounded-corners-exclude = [
    "window_type = 'dock'",
    "class_g = 'Polybar'"
];

# Exclude list to prevent blurring things that shouldn't be blurred
blur-background-exclude = [
    # "window_type = 'dock'",
    "window_type = 'desktop'",
    "_GTK_FRAME_EXTENTS@:c"
];

wintypes:
{
    normal = { blur-background = true; };
    splash = { blur-background = true; };
    dock   = { shadow = false; opacity = false; };
};

shadow = false;
fading = true;

# Keep these at 1.0 so your other apps stay solid
inactive-opacity = 1.0;
active-opacity = 1.0;
frame-opacity = 1.0;
