# --- Alacritty Rice Config (FiraCode Nerd Font) ---

[window]
opacity = 0.85
blur = true

[window.padding]
x = 10
y = 10

[font]
# The family name for the Nerd Font version is usually "FiraCode Nerd Font"
size = 9.0

[font.normal]
family = "FiraCode Nerd Font"
style = "Retina" # Or "Regular" if you prefer a thinner look

[font.bold]
family = "FiraCode Nerd Font"
style = "Bold"

[colors.primary]
background = "#1a1b26"
foreground = "#c0caf5"

[colors.normal]
black   = "#15161e"
red     = "#f7768e"
green   = "#9ece6a"
yellow  = "#e0af68"
blue    = "#7aa2f7"
magenta = "#bb9af7"
cyan    = "#7dcfff"
white   = "#a9b1d6"

[colors.bright]
black   = "#414868"
red     = "#f7768e"
green   = "#9ece6a"
yellow  = "#e0af68"
blue    = "#7aa2f7"
magenta = "#bb9af7"
cyan    = "#7dcfff"
white   = "#c0caf5"

[keyboard]
bindings = [
    # Zooming fixes (Handles Ctrl+= and Ctrl+Shift+=)
    { key = "Equals", mods = "Control", action = "IncreaseFontSize" },
    { key = "Plus",   mods = "Control", action = "IncreaseFontSize" },
    { key = "Minus",  mods = "Control", action = "DecreaseFontSize" },
    { key = "Key0",   mods = "Control", action = "ResetFontSize" },
    
    # Terminal clipboard
    { key = "V", mods = "Control|Shift", action = "Paste" },
    { key = "C", mods = "Control|Shift", action = "Copy" },
]

[cursor]
style = { shape = "Block", blinking = "On" }
